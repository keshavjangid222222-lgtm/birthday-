<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vanshii ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(45deg, #ff758c, #ff7eb3);
  color: white;
  overflow: hidden;
}

h1 {
  font-size: 45px;
  margin-top: 40px;
  animation: fadeIn 3s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.slideshow {
  position: relative;
  width: 250px;
  margin: auto;
}

.slide {
  display: none;
  width: 100%;
  border-radius: 20px;
}

.active {
  display: block;
}

button {
  margin-top: 25px;
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4e50;
  cursor: pointer;
}

/* ❤️ Romantic line style */
.love-text {
  margin-top: 20px;
  font-size: 22px;
  animation: fadeIn 4s ease-in-out;
}
</style>

</head>

<body>

<h1>Happy Birthday Vanshii ❤️ 🎂</h1>

<div class="slideshow">
  <img class="slide active" src="photo1.jpg">
  <img class="slide" src="photo2.jpg">
  <img class="slide" src="photo3.jpg">
</div>

<!-- ❤️ ADDED LINE -->
<p class="love-text">I love you Vanshii ❤️ Forever ♾️</p>

<button onclick="playMusic()">Play Music 🎶</button>

<audio id="music" loop autoplay>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
let index = 0;
let slides = document.querySelectorAll(".slide");

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 2000);

function playMusic() {
  document.getElementById("music").play();
}
</script>

</body>
</html>
